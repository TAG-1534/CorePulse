<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .status-running { color: #4ade80; }
        .status-exited { color: #f87171; }
        h1 { border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .btn { display: inline-block; margin-top: 10px; padding: 8px 16px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>System Dashboard</h1>
    <div class="grid">
        {% for c in containers %}
        <div class="card">
            <h3>{{ c.name }}</h3>
            <p>Status: <span class="status-{{ c.status }}">{{ c.status.upper() }}</span></p>
            <p style="font-size: 12px; color: #94a3b8;">{{ c.image }}</p>
            <a href="http://{{ tn_ip }}:[PORT]" class="btn">Open App</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>

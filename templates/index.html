<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Lab Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; position: relative; }
        .status-running { color: #4ade80; }
        .status-exited { color: #f87171; }
        .sub-service { font-size: 0.85em; background: #334155; margin: 4px 0; padding: 4px 8px; border-radius: 4px; display: flex; justify-content: space-between; }
        .btn { display: block; text-align: center; margin-top: 15px; padding: 10px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>My Custom Dashboard</h1>
    <div class="grid">
        
        <div class="card">
            <h2>Immich Photos</h2>
            <p>Global Status: <span class="status-{{ groups['Immich']['status'] }}">● {{ groups['Immich']['status'].upper() }}</span></p>
            <div class="sub-services">
                {% for s in groups['Immich']['services'] %}
                <div class="sub-service">
                    <span>{{ s.name }}</span>
                    <span class="status-{{ s.status }}">●</span>
                </div>
                {% endfor %}
            </div>
            <a href="{{ groups['Immich']['url'] }}" class="btn">Open Immich</a>
        </div>

        {% for c in groups['Other Apps']['services'] %}
        <div class="card">
            <h2>{{ c.name }}</h2>
            <p>Status: <span class="status-{{ c.status }}">● {{ c.status.upper() }}</span></p>
            <a href="#" class="btn">Open App</a>
        </div>
        {% endfor %}

    </div>
</body>
</html>
